version: 2

# OpenSSF Scorecard "Maintained" + "Dependency-Update-Tool" coverage:
# every dependency manifest the build / image / release path touches has
# a Dependabot entry below. Groupings keep open-PR pressure low without
# starving security updates of immediate visibility:
#
#   * `security-updates` group (applies-to: security-updates) — every
#     ecosystem opens a *single* high-priority PR per scan window for
#     all security advisories, even if it crosses the per-ecosystem cap.
#   * `*-development` / `*-production` groups — version updates are
#     batched by dependency-type to reduce churn (the
#     OSSF-recommended pattern for noisy ecosystems).
#
# Schedule is weekly Monday 09:00 UTC across the board so the maintainer
# triages a single Dependabot batch instead of daily drip.

updates:
  # ---------------------------------------------------------------------
  # JavaScript / TypeScript: root workspace (Next.js app + shared tooling)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production:
        dependency-type: "production"
        update-types:
          - "patch"

  # ---------------------------------------------------------------------
  # JavaScript / TypeScript: @kullailabs/mcop-core (published to npm)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "npm"
      - "packages/core"
    commit-message:
      prefix: "chore(deps-core)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      core-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      core-production:
        dependency-type: "production"
        update-types:
          - "patch"

  # ---------------------------------------------------------------------
  # GitHub Actions: workflow + composite-action references
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Docker: every Dockerfile in the repo (each FROM is scanned per dir)
  # ---------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/mcop_cuda_server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "docker"
      - "mcop_cuda_server"
    commit-message:
      prefix: "chore(docker-cuda)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/services/ledger"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "docker"
      - "services/ledger"
    commit-message:
      prefix: "chore(docker-ledger)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/examples/reproducible-benchmark"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "docker"
      - "examples"
    commit-message:
      prefix: "chore(docker-examples)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------
  # Python: mcop_package (PyPI) + hash-pinned CI/runtime requirements
  # ---------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/mcop_package"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "python"
      - "mcop_package"
    commit-message:
      prefix: "chore(pip-mcop)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      pip-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      pip-production:
        dependency-type: "production"
        update-types:
          - "patch"

  - package-ecosystem: "pip"
    directory: "/.github/requirements"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Kuonirad"
    labels:
      - "dependencies"
      - "python"
      - "ci-requirements"
    commit-message:
      prefix: "chore(pip-ci)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      ci-requirements:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
