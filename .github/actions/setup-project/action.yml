name: 'Setup Project Environment'
description: 'Setup pnpm + Node.js (with optional caching and dependency install). Expects the caller to have already checked out the code.'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20.x'
  enable-cache:
    description: 'Enable pnpm dependency caching'
    required: false
    default: 'true'
  install-deps:
    description: 'Run pnpm install to install dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: '9.15.0'
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.enable-cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
