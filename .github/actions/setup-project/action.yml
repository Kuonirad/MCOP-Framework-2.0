name: 'Setup Project Environment'
description: 'Checkout code, setup Node.js with optional caching, and optionally install dependencies'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20.x'
  enable-cache:
    description: 'Enable npm dependency caching'
    required: false
    default: 'true'
  install-deps:
    description: 'Run npm ci to install dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    # Explicit checkout is NOT needed here if the workflow calling this action
    # has already performed a checkout. However, if this is intended to be atomic,
    # we should be careful.
    # Given the CI workflow explicitly calls checkout before using this,
    # we should remove the redundant checkout inside this composite action OR
    # remove the checkout in the workflow.
    #
    # Best practice for local actions: The caller must checkout first to even access this action.
    # Therefore, we do not need to checkout AGAIN inside, unless we are checking out a diff repo.
    # BUT, calling `actions/checkout` with defaults cleans the workspace.
    # So we will REMOVE the checkout step from here to avoid wiping the caller's workspace.

    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.enable-cache == 'true' && 'npm' || '' }}

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      run: npm ci
      shell: bash
