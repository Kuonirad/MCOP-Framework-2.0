name: 'Setup Project Environment'
description: 'Checkout code, setup pnpm + Node.js, and optionally install dependencies'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20.x'
  enable-cache:
    description: 'Enable pnpm dependency caching via setup-node'
    required: false
    default: 'true'
  install-deps:
    description: 'Run pnpm install --frozen-lockfile'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.0
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.enable-cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      run: pnpm install --frozen-lockfile
      shell: bash
