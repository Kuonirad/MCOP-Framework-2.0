name: 'Setup Project Environment'
description: 'Setup pnpm + Node.js (with optional caching and dependency install). Expects the caller to have already checked out the code.'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24.x'
  enable-cache:
    description: 'Enable pnpm dependency caching'
    required: false
    default: 'true'
  install-deps:
    description: 'Run pnpm install to install dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Activate Corepack and pin pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@9.15.0 --activate

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: '9.15.0'
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.5.0
      with:
        node-version: ${{ inputs.node-version }}
        # Only enable the pnpm cache when we are actually going to install
        # dependencies — otherwise the post-job cache save fails with
        # "Path Validation Error" because the pnpm store was never populated.
        cache: ${{ (inputs.enable-cache == 'true' && inputs.install-deps == 'true') && 'pnpm' || '' }}

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
