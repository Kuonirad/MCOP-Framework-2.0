name: 'Setup Project Environment'
description: 'Checkout code, setup Node.js with optional caching, and optionally install dependencies'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20.x'
  enable-cache:
    description: 'Enable npm dependency caching'
    required: false
    default: 'true'
  install-deps:
    description: 'Run npm ci to install dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.30.3
    - name: Fix package.json syntax error dynamically
      run: sed -i 's/"eco:audit": "node scripts\/eco-fitness-audit.mjs"/"eco:audit": "node scripts\/eco-fitness-audit.mjs",/' package.json
      shell: bash

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: "9.x"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.enable-cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      run: pnpm install --frozen-lockfile
      shell: bash