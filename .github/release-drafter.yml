name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Fixes"
    labels:
      - fix
      - bug
  - title: "🛡️ Security"
    labels:
      - security
  - title: "⚡ Performance"
    labels:
      - performance
      - perf
  - title: "🧰 Maintenance"
    labels:
      - chore
      - maintenance
      - ci
  - title: "📚 Documentation"
    labels:
      - docs
      - documentation
  - title: "📦 Dependencies"
    labels:
      - dependencies
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bug
      - chore
      - security
      - perf
      - performance
      - docs
      - dependencies
  default: patch
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
