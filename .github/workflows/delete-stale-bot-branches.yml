name: Delete Stale Bot Branches

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List branches without deleting'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # PARP CS #46 (TokenPermissionsID, informational):
    #   `contents: write` is REQUIRED for this workflow to call
    #   `gh api -X DELETE repos/$REPO/git/refs/heads/$branch` on stale bot
    #   branches (the only purpose of the workflow). The script restricts
    #   deletion targets to a narrow pattern list (script line 46) AND skips
    #   protected branches AND skips branches with open PRs AND requires
    #   each branch to be older than 30 days, so even with the write scope
    #   the blast radius is bounded to abandoned bot branches.
    #   Workflow-level perms are `contents: read` (line 17-18). The default
    #   for `dry_run` is 'true' on workflow_dispatch, also limiting risk
    #   from a compromised manual trigger.
    #   See docs/SECURITY-POSTURE-NOTES.md for the full PARP justification.
    permissions:
      contents: write   # required for git refs DELETE (informational alert #46)
    steps:
      - name: Setup GitHub CLI
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Delete bot-prefixed branches older than threshold
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # Scheduled runs delete by default. Manual workflow_dispatch may
          # override via the dry_run input (defaults to 'true' in the UI).
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # Branches must be older than this to be eligible for deletion.
          AGE_DAYS: '30'
        run: |
          set -euo pipefail

          # Patterns that match automated / AI-agent branch names. Updated
          # 2026-05-11 after audit found 47 stale branches that the original
          # narrow allowlist (bolt|palette|sentinel|jules) missed. See
          # docs/audits/branch-cleanup-2026-05-11.md for the audit, and
          # docs/audits/branch-cleanup-strategy.md for the longer-form policy.
          PATTERNS="bolt[-/]|palette[-/]|sentinel[-/]|jules[-/]|test-format-|testing[-/]|perf-|ux[-/]|feat-ui-|security[-/]|fix[-/]cli-|fix[-/]logger-|fix[-/]production-deployment-"

          echo "=== Branch Cleanup Report ==="
          echo "Repository:  $REPO"
          echo "Dry run:     $DRY_RUN"
          echo "Age cutoff:  > $AGE_DAYS days"
          echo "Patterns:    $PATTERNS"
          echo ""

          deleted=0
          skipped=0
          page=1

          while true; do
            branches=$(gh api "repos/$REPO/branches?per_page=100&page=$page" \
              --jq '[.[].name | select(test("^('"$PATTERNS"')"))] | .[]' 2>/dev/null || true)

            [ -z "$branches" ] && break

            for branch in $branches; do
              branch_info=$(gh api "repos/$REPO/branches/$branch" 2>/dev/null || echo '{}')
              last_commit=$(echo "$branch_info" | jq -r '.commit.commit.committer.date // empty')
              protected=$(echo "$branch_info" | jq -r '.protected // false')

              if [ -z "$last_commit" ]; then
                echo "SKIP: $branch (could not fetch info)"
                skipped=$((skipped + 1))
                continue
              fi

              if [ "$protected" = "true" ]; then
                echo "SKIP: $branch (protected)"
                skipped=$((skipped + 1))
                continue
              fi

              # Skip if any OPEN PR has this branch as its head — never
              # delete a branch with active review work.
              open_prs=$(gh api "repos/$REPO/pulls?state=open&head=$(echo "$REPO" | cut -d/ -f1):$branch" \
                --jq 'length' 2>/dev/null || echo "0")
              if [ "$open_prs" != "0" ]; then
                echo "SKIP: $branch (has $open_prs open PR(s))"
                skipped=$((skipped + 1))
                continue
              fi

              days_old=$(( ($(date +%s) - $(date -d "$last_commit" +%s)) / 86400 ))

              if [ "$days_old" -gt "$AGE_DAYS" ]; then
                if [ "$DRY_RUN" = "true" ]; then
                  echo "WOULD DELETE: $branch ($days_old days old)"
                else
                  echo "DELETING: $branch ($days_old days old)"
                  gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" 2>/dev/null || {
                    echo "FAILED: $branch"
                    skipped=$((skipped + 1))
                    continue
                  }
                fi
                deleted=$((deleted + 1))
              else
                echo "KEEP: $branch ($days_old days old, <= $AGE_DAYS days)"
                skipped=$((skipped + 1))
              fi
            done

            page=$((page + 1))
          done

          echo ""
          echo "=== Summary ==="
          echo "Deleted/Would delete: $deleted"
          echo "Kept/Skipped:         $skipped"
