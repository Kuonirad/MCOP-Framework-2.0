name: Pull Request Checklist

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checklist-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checklist:
    # Skip for bot-authored PRs (Dependabot, release-drafter, etc.). Their
    # auto-generated PR bodies do not follow the project's manual PR
    # template, and the bots cannot meaningfully tick the human-review
    # checkboxes. Branch protection still gates merges via the other
    # required checks (lint, typecheck, tests, CodeQL, license guard).
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'release-drafter[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup project environment without install
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.22.2
          install-deps: 'false'
          enable-cache: 'false'

      - name: Collect changed files
        run: |
          set -euo pipefail
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > changed-files.txt
          cat changed-files.txt

      - name: Verify completed PR checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          CHANGED_FILES_FILE: changed-files.txt
        run: |
          printf '%s' "$PR_BODY" > pr-body.txt
                      PR_BODY_FILE=pr-body.txt node scripts/verify-pr-checklist.mjs
