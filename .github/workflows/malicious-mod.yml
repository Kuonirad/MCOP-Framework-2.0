name: CI Security - Malicious Mod Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-malicious-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          install-deps: 'false'

      - name: Execute malicious-mod harness
        run: node scripts/security/test-malicious-mod.mjs
