name: CI Security - Malicious Mod Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-malicious-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          install-deps: 'false'

      - name: Execute malicious-mod harness
        run: node scripts/security/test-malicious-mod.mjs
