name: CI Security - Malicious Mod Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-malicious-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          install-deps: 'false'

      - name: Execute malicious-mod harness
        run: node scripts/security/test-malicious-mod.mjs
