name: CI Security - Malicious Mod Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-malicious-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project environment (minimal)
        uses: ./.github/actions/setup-project
        with:
          node-version: '20'

      - name: Execute malicious-mod harness
        run: node scripts/security/test-malicious-mod.mjs
