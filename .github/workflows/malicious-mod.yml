name: CI Security - Malicious Mod Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-malicious-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          install-deps: 'false'

      - name: Execute malicious-mod harness
        run: node scripts/security/test-malicious-mod.mjs
