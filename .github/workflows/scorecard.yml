name: OpenSSF Scorecard

# Phase VII (Supply-Chain & Provenance Integrity) of the v2.0 audit directive:
# the canonical Scorecard workflow that docs/SUPPLY_CHAIN_TRUST.md describes
# as "ship it now". Publishes results to the public Scorecard dashboard and
# uploads SARIF to GitHub Code Scanning so checks become a required-status
# signal in branch protection.
#
# publish_results: true requires the job that runs ossf/scorecard-action to
# contain only approved `uses` steps (no `run:`). See:
# https://github.com/ossf/scorecard-action#workflow-restrictions
# Filtering for Code Scanning therefore lives in a separate job.

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Needed for keyless publishing of Scorecard results.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Raw results go to the public scorecard.dev dashboard.
          publish_results: true

      # Artifact must be the raw SARIF (pre-filter). Filter runs only for
      # Code Scanning in the follow-up job so this job stays uses-only.
      - name: Upload Scorecard SARIF as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          if-no-files-found: error
          retention-days: 30

  # Separate job: may use `run:` freely. Filters allowlisted Tauri GTK3/glib
  # RUSTSECs before uploading to GitHub Code Scanning (alert #30).
  code-scanning:
    name: Upload filtered Scorecard SARIF
    needs: scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download Scorecard SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scorecard-sarif
          path: .

      - name: Filter accepted Tauri GTK3/glib RUSTSECs from Code Scanning SARIF
        # Scorecard OSV still lists INFO unmaintained gtk-rs 0.18 crates required
        # by wry/webkit2gtk (no patched crates). cargo-audit already ignores the
        # same IDs in apps/desktop/src-tauri/.cargo/audit.toml and fails on any
        # *new* advisory. Strip only those allowlisted IDs from the SARIF that
        # feeds GitHub Code Scanning so alert #30 does not re-open; any other
        # RUSTSEC remains a Code Scanning finding.
        run: node scripts/scorecard-filter-accepted-rust-vulns.mjs scorecard-results.sarif

      - name: Upload Scorecard SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: scorecard-results.sarif
