name: Auto-close duplicate bot PRs

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  close-bot-prs:
    runs-on: ubuntu-latest
    # PARP CS #44 (TokenPermissionsID, informational):
    #   `contents: write` is REQUIRED here to call `github.rest.git.deleteRef`
    #   on the bot-prefixed source branches after their PRs are closed.
    #   GitHub's permission model does not expose a narrower "delete refs"
    #   scope — `contents: write` is the documented minimum for any
    #   git-ref-deletion API call. `pull-requests: write` is also required
    #   (separate scope) to actually close the PRs and add the explanatory
    #   comment. The workflow declares `contents: read` at the top level
    #   (line 8-9), so only this single job carries the write capability.
    #   See docs/SECURITY-POSTURE-NOTES.md for the full PARP justification.
    permissions:
      pull-requests: write   # close PRs + add explanatory comment
      contents: write        # delete head refs of closed bot branches (informational alert #44)
    steps:
      - name: Close bot-pattern PRs and delete their branches
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Branches / titles belonging to experimental code-generation bots
            // whose PRs should be consolidated down to one review at a time.
            const botPattern = /^(bolt|palette|jules)\//i;
            const botTitlePattern = /^\s*(⚡\s*)?(Bolt|Palette|Jules):/i;

            // Bot accounts we never want to auto-close — dependency and security
            // updates must be triaged by humans, not garbage-collected.
            const allowlistedBots = new Set([
              "dependabot[bot]",
              "renovate[bot]",
              "github-actions[bot]",
              "pre-commit-ci[bot]",
              "snyk-bot",
            ]);

            const comment = [
              "Closed as part of automated-PR consolidation.",
              "",
              "This PR matched a known duplicate-bot pattern and was superseded by",
              "merged work or by a sibling PR. Please reopen (or file a fresh PR",
              "against `main`) if it contains substantive work that is not already",
              "merged."
            ].join("\n");

            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 100 }
            );

            let closed = 0;
            for (const pr of prs) {
              const headRef = pr.head && pr.head.ref ? pr.head.ref : "";
              const login = (pr.user && pr.user.login) || "";

              // Never touch allowlisted bots (Dependabot, Renovate, etc.).
              if (allowlistedBots.has(login)) continue;

              const isBotBranch = botPattern.test(headRef);
              const isBotTitle = botTitlePattern.test(pr.title || "");
              // Only fall back to the generic "is a bot" heuristic when the
              // branch / title patterns already suggest a duplicate-bot PR;
              // otherwise Dependabot, Renovate, etc. would be caught here.
              if (!isBotBranch && !isBotTitle) continue;

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: comment,
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: "closed",
                });
                if (pr.head && pr.head.repo && pr.head.repo.full_name ===
                    `${context.repo.owner}/${context.repo.repo}`) {
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${headRef}`,
                    });
                  } catch (e) {
                    core.info(`Could not delete branch ${headRef}: ${e.message}`);
                  }
                }
                closed++;
                await new Promise(r => setTimeout(r, 750));
              } catch (e) {
                core.warning(`Failed to close PR #${pr.number}: ${e.message}`);
              }
            }

            core.notice(`Closed ${closed} duplicate bot PR(s).`);
