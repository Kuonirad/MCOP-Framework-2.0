name: Publish Python to PyPI

# Builds and publishes the `mcop` Python distribution on every push of a tag
# starting with `py-v` (e.g. `py-v3.2.0`). Uses PyPI Trusted Publishing via
# OIDC — no long-lived API tokens. Configure the trusted publisher at
# https://pypi.org/manage/account/publishing/ (or pending-publisher for the
# very first release) with:
#   PyPI Project Name: mcop
#   Owner:             Kuonirad
#   Repository:        MCOP-Framework-2.0
#   Workflow:          publish-pypi.yml
#   Environment:       pypi
# The `pypi` environment also gates the release behind branch protection and
# reviewer rules you can set under repo Settings → Environments.
#
# This workflow OWNS the GitHub Release for the tag — do not pre-create a
# Release object via the API or UI. The workflow creates it as a draft,
# attaches the CycloneDX SBOMs, then publishes it. This is required because
# GitHub's Immutable Releases setting locks released artefacts at publish
# time, blocking post-publish asset uploads.

on:
  push:
    tags:
      - 'py-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which registry to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # 1. Build sdist + wheel on a matrix-free builder and upload as a
  #    versioned artifact. Keeping build and publish in separate jobs
  #    is the pattern PyPA recommends so the publish job never touches
  #    the source tree.
  # ------------------------------------------------------------------
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref_name, 'py-v'))
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Verify package version matches release tag
        if: startsWith(github.ref_name, 'py-v')
        working-directory: mcop_package
        run: |
          tag="${GITHUB_REF_NAME#py-v}"
          pkg_version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag version : $tag"
          echo "pkg version : $pkg_version"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Release tag py-v$tag does not match pyproject.toml version $pkg_version"
            exit 1
          fi

      - name: Build sdist and wheel
        working-directory: mcop_package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: mcop_package/dist/
          if-no-files-found: error
          retention-days: 7

      # ------------------------------------------------------------------
      # CycloneDX SBOM generation. Runs alongside the Python build so the
      # SBOM is produced from the same checkout commit that yielded the
      # sdist/wheel, then carried forward to the publish job as an
      # artefact (avoids re-running pnpm install in publish jobs).
      # ------------------------------------------------------------------
      - name: Setup pnpm + Node for SBOM generation
        uses: ./.github/actions/setup-project
        with:
          node-version: '22.x'

      - name: Generate CycloneDX SBOMs
        run: pnpm sbom

      - name: Validate CycloneDX SBOMs against upstream schema
        run: pnpm sbom:validate

      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cyclonedx-sbom
          path: docs/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # 2. Publish to TestPyPI (default for workflow_dispatch unless
  #    explicitly targeting `pypi`).
  # ------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mcop
    permissions:
      id-token: write   # OIDC — required for trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

  # ------------------------------------------------------------------
  # 3. Publish to real PyPI. Gated by the `pypi` environment which
  #    you can configure with required reviewers in repo settings.
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'py-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/mcop
    permissions:
      contents: write   # required to create + manage the GitHub Release with SBOMs
      id-token: write   # OIDC — required for trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Download SBOM artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cyclonedx-sbom
          path: sbom/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Idempotent re-runs: PyPI's /legacy/ endpoint returns 400 Bad Request
          # for any re-upload of an existing filename. Without skip-existing
          # the second attempt of any release (manual re-run, edited+republished
          # release, or a partial first attempt that landed the sdist before
          # erroring on the wheel) fails the workflow even though the package
          # is already on PyPI. Mirror the testpypi step's behaviour.
          skip-existing: true
          # Surface the real failure reason on the next 400 instead of the
          # generic upstream "Bad Request" line.
          verbose: true
          print-hash: true

      # ------------------------------------------------------------------
      # GitHub Release management. The repo has Immutable Releases enabled,
      # which locks released artefacts at publish time and rejects all
      # post-publish asset uploads. To get the CycloneDX SBOMs attached we
      # therefore have to (1) make sure no released-and-locked release
      # exists for this tag yet, (2) create a draft with the SBOMs as
      # assets, then (3) flip the draft to published so it inherits the
      # immutability lock with the SBOMs already in place.
      # ------------------------------------------------------------------
      - name: Remove any prior published release for this tag
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Existing release found for tag $TAG — deleting (Immutable Releases blocks asset uploads after publish)"
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag=false
          else
            echo "No existing release for tag $TAG — proceeding to create"
          fi

      - name: Create draft release with SBOMs attached
        id: draft_release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: "Python mcop ${{ github.ref_name }}"
          draft: true
          generate_release_notes: true
          body: |
            **Python `mcop` ${{ github.ref_name }}** — published to PyPI via Trusted Publishing (OIDC, automatic Sigstore provenance).

            - PyPI: https://pypi.org/project/mcop/
            - Framework release notes: see the corresponding `v*` framework Release for the full feature set.

            **Attached assets**: CycloneDX SBOMs covering the framework workspace and the `@kullailabs/mcop-core` package, generated by `pnpm sbom` and validated against the upstream CycloneDX schema (`pnpm sbom:validate`).
          files: |
            sbom/mcop-framework.cdx.json
            sbom/mcop-core.cdx.json
          fail_on_unmatched_files: true

      - name: Publish the release (lifts draft, becomes immutable with SBOMs in place)
        if: steps.draft_release.outputs.id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.id }}
        run: |
          gh api -X PATCH "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false -F make_latest=false
          echo "Release ${RELEASE_ID} (tag ${{ github.ref_name }}) is now published."
