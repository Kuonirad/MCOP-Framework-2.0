name: CUDA Substrate Smoke

# Φ2–Φ4 contract: prove the in-process CUDA layer, the verifiedDevice
# gate, the op-sharded benchmark harness, and the v2.4 proteome layer
# all stay byte-stable on a CPU-only runner. No GPU host required —
# `onnxruntime-node` is a peer-optional install and the layer is
# probe-driven (Φ5 `auto-not-capable` on `ubuntu-latest`).
#
# This is the matrix follow-up requested in `docs/CUDA_PHI1_PHI5.md`
# (Φ4 §"Φ4 follow-up"): a dedicated job whose entire purpose is to
# fail loudly the moment any of the CUDA / proteome substrate
# invariants drifts on `ubuntu-latest`, even without a GPU.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cuda-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-smoke:
    name: CUDA + proteome substrate smoke (CPU fallback matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Two CUDA-flag substrates to exercise the Φ5 probe + the
        # explicit-off resolution path. The probe substrate is the
        # repo's default (`MCOP_ENABLE_CUDA=auto`).
        enable-cuda: ['auto', '0']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.22.3

      - name: Run CUDA hardware-layer regression
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm test -- --testPathPatterns="cuda" --runInBand

      - name: Run proteome substrate regression
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm test -- --testPathPatterns="proteome" --runInBand

      - name: Run CUDA op-sharded benchmark harness (smoke)
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm benchmark:cuda-ops:smoke

      - name: Run verifiedDevice 1k-step soak (smoke)
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm soak:cuda-verified-device

      - name: Run verifiedDevice canary regression
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm soak:cuda-verified-device:canary

      - name: Run v2.4 LS20 ARC benchmark (smoke)
        env:
          MCOP_ENABLE_CUDA: ${{ matrix.enable-cuda }}
        run: pnpm benchmark:arc-ls20:smoke

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cuda-substrate-smoke-${{ matrix.enable-cuda }}
          path: |
            docs/benchmarks/cuda_*.json
            docs/benchmarks/arc_ls20.json
          if-no-files-found: warn
          retention-days: 7
