name: Publish npm package

# Builds and publishes @kullailabs/mcop-core to the public npm registry
# using npm **Trusted Publishing** (OIDC). No NPM_TOKEN is stored or used.
# Provenance attestations (Sigstore transparency log) are generated
# automatically by npm when publishing via a trusted publisher.
#
# Required one-time setup on npmjs.com:
#   1. Publish the first release manually from `packages/core` to create the
#      package on npm. npm trusted publishers are package-level, and npm
#      requires the package to already exist before the trusted publisher can
#      be configured. **See `packages/core/BOOTSTRAP.md` for the exact
#      command sequence and the @scope-ownership prerequisite.**
#   2. Then open:
#      https://www.npmjs.com/package/@kullailabs/mcop-core → Settings →
#      Trusted publishing → GitHub Actions, with:
#     Organization or user : Kuonirad
#     Repository           : MCOP-Framework-2.0
#     Workflow filename    : publish-npm.yml
#     Environment          : npm
#
# This workflow includes a pre-flight registry probe so a release event
# triggered before the bootstrap is complete fails with a clear,
# human-readable error instead of a generic exit-code-1.
#
# Triggers:
#   • Push of an `npm-v*` tag → real publish, then an immutable-safe draft
#     GitHub Release containing the two verified CycloneDX SBOMs.
#   • GitHub Release tagged `npm-v*` (e.g. `npm-v0.1.0`) → idempotent retry;
#     the registry upload and published Release are preserved only when their
#     exact version/assets already match.
#   • Manual dispatch with `dry_run: true` (default) → validation only. If the
#     current package version is already published, this uses `npm pack
#     --dry-run` because npm 11 rejects `npm publish --dry-run` for duplicate
#     versions. Manual production upload is deliberately rejected: every real
#     publish must be bound to an existing `npm-v<package-version>` tag so the
#     registry artifact and immutable GitHub Release share one source commit.
#
# Tag pushes and GitHub Release publishes can both arrive for the same
# `npm-v*` version. The registry probe below makes that path idempotent: the
# first event publishes, and any duplicate event skips the upload while still
# completing the deployment and release-asset steps cleanly.
#
# Requirements enforced in-workflow:
#   • npm CLI ≥ 11.5.1  (trusted publishing prerequisite)
#   • Node.js ≥ 22.14   (trusted publishing prerequisite — we use Node 24
#     because it ships with npm 11 already, avoiding a self-upgrade step
#     that is fragile on top of Node 22's bundled npm 10.x).

on:
  release:
    types: [published]
  push:
    tags:
      - 'npm-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validation only; production publishes require pushing an npm-v* tag'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @kullailabs/mcop-core
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'npm-v')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/npm-v'))
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@kullailabs/mcop-core
    # PARP CS #9 (TokenPermissionsID, informational):
    #   `contents: write` is REQUIRED here, scoped to this single job. The
    #   release lifecycle creates a draft for the `npm-v*` tag, uploads and
    #   verifies `mcop-framework.cdx.json` + `mcop-core.cdx.json`, then
    #   publishes the exact draft. Without `contents: write` the release
    #   lifecycle returns 403 and the SBOMs cannot be distributed alongside
    #   the tarball, breaking PARP/MCOP invariant #4 (SBOM/CI integrity) and
    #   OSSF Scorecard's own Pinned-Dependencies / SBOM checks.
    #   Workflow-level perms are already `contents: read` (line 47-48), so
    #   this scope is as narrow as GitHub's permission model allows.
    #   See docs/SECURITY-POSTURE-NOTES.md for the full PARP justification.
    permissions:
      contents: write   # SBOM upload to Release (informational alert #9)
      id-token: write   # OIDC — required for Trusted Publishing + provenance
    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject untagged manual production publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == false
        shell: bash
        run: |
          echo "::error::Manual npm uploads are disabled. Push npm-v<package-version> from main so npm provenance, the source tag, and the immutable SBOM Release remain bound to one commit."
          exit 1

      - name: Require production publishes to descend from main
        if: >-
          github.event_name == 'release' ||
          github.event_name == 'push'
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Production npm releases must point to a commit on main."
            exit 1
          fi

      - name: Setup Node.js 24 (ships with npm 11, required for trusted publishing)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm version is >= 11.5.1 (trusted publishing prerequisite)
        run: |
          node --version
          npm --version
          node -e "
            const v = require('child_process').execSync('npm --version').toString().trim();
            const [maj, min, patch] = v.split('.').map(Number);
            if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && patch < 1)))) {
              console.error('::error title=npm too old for trusted publishing::npm ' + v + ' is below the required 11.5.1. Do NOT reintroduce npm install -g npm@latest (MODULE_NOT_FOUND: promise-retry regression). Pin node-version to a newer Node 24 LTS minor instead.');
              process.exit(1);
            }
            console.log('npm ' + v + ' satisfies >= 11.5.1');
          "

      - name: Install core package dependencies
        # npm ci installs from package-lock.json with integrity checks for
        # every entry — satisfies OpenSSF Scorecard's Pinned-Dependencies
        # check (pinning by package-lock SRI hashes). Two attempts because
        # the npm registry occasionally rate-limits the OIDC publish runners.
        run: npm ci --ignore-scripts=false || npm ci --ignore-scripts=false

      - name: Verify package version matches release tag
        if: github.event_name == 'release' || github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#npm-v}"
          pkg_version=$(node -p "require('./package.json').version")
          echo "tag version : $tag"
          echo "pkg version : $pkg_version"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Release tag npm-v$tag does not match package.json version $pkg_version"
            exit 1
          fi

      # Pre-flight: trusted publishing requires the package (and the @scope
      # it lives under) to already exist on the registry — npm cannot
      # auto-create a scope from a tokenless OIDC publish.  We probe the
      # registry up-front so a misconfigured release fails with a clear,
      # actionable error instead of dying inside `npm publish` with a
      # generic non-zero exit.
      - name: Pre-flight — verify package + scope are bootstrapped on npm
        id: npm_registry
        if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          encoded_pkg_name=$(node -p "encodeURIComponent(require('./package.json').name)")
          echo "Probing npm registry for ${pkg_name}…"
          metadata_file=$(mktemp)
          if ! http_code=$(curl -sS -o "$metadata_file" -w "%{http_code}" \
            "https://registry.npmjs.org/${encoded_pkg_name}"); then
            http_code="000"
          fi
          echo "Registry returned HTTP ${http_code}"
          if [ "$http_code" = "404" ]; then
            cat <<EOF >&2
          ::error title=npm publish bootstrap incomplete::${pkg_name} is not yet on the npm registry.
          Trusted publishing is package-scoped and cannot create the package or its @scope on the first run.
          Required one-time setup (see packages/core/BOOTSTRAP.md):
            1. Ensure the @scope owner on npmjs.com matches your account, or create the org.
            2. From a local checkout of packages/core, run: npm publish --access public
            3. On npmjs.com, configure the trusted publisher (workflow file: publish-npm.yml).
            4. Re-cut the GitHub Release; this workflow will then succeed via OIDC.
          EOF
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::Unexpected HTTP ${http_code} from registry probe — aborting before publish."
            exit 1
          fi
          echo "Package found on npm — proceeding to trusted-publish flow."
          if PKG_VERSION="$pkg_version" node -e "const fs = require('node:fs'); const metadata = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); const versions = metadata.versions || {}; process.exit(Object.prototype.hasOwnProperty.call(versions, process.env.PKG_VERSION) ? 0 : 1);" "$metadata_file"; then
            echo "version_published=true" >> "$GITHUB_OUTPUT"
            echo "${pkg_name}@${pkg_version} already exists on npm; duplicate release/tag event will skip upload."
          else
            echo "version_published=false" >> "$GITHUB_OUTPUT"
            echo "${pkg_name}@${pkg_version} is not published yet; this run must upload it."
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke-test the advertised ESM and CJS triad
        run: |
          node --input-type=module -e "import('./dist/index.js').then(m => { for (const name of ['NovaNeoEncoder','StigmergyV5','HolographicEtch']) if (typeof m[name] !== 'function') throw new Error('missing ESM export '+name); });"
          node -e "const m=require('./dist/index.cjs'); for (const name of ['NovaNeoEncoder','StigmergyV5','HolographicEtch']) if (typeof m[name] !== 'function') throw new Error('missing CJS export '+name);"

      - name: Publish (dry run)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.dry_run == true &&
          steps.npm_registry.outputs.version_published != 'true'
        run: npm publish --access public --dry-run

      - name: Pack validation (dry run for already-published version)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.dry_run == true &&
          steps.npm_registry.outputs.version_published == 'true'
        run: npm pack --dry-run

      # ------------------------------------------------------------------
      # CycloneDX SBOM generation (root-of-repo command). We deliberately
      # do this AFTER the npm build step so the SBOM reflects the exact
      # dependency graph that will be published, and BEFORE the publish
      # step so a malformed SBOM aborts the release before a tarball ever
      # leaves the runner.
      # ------------------------------------------------------------------
      - name: Setup pnpm + Node for SBOM generation (root workspace)
        uses: ./.github/actions/setup-project
        with:
          # IMPORTANT: keep this on Node 24 so the publish step that follows
          # runs under npm 11.x. The earlier `actions/setup-node@v6` step
          # installed Node 24, but this composite action calls
          # `actions/setup-node@v4` again — re-pinning Node here would
          # downgrade to whatever is requested. We previously pinned to
          # '22.x', which silently dropped npm to 10.9.7 and disabled OIDC
          # trusted publishing entirely (npm 10.x has no OIDC code path).
          # See diagnostic run 25177269818 (`npm verbose npm v10.9.7`).
          node-version: '24.x'

      - name: Generate CycloneDX SBOMs
        working-directory: ${{ github.workspace }}
        run: pnpm sbom

      - name: Validate CycloneDX SBOMs against upstream schema
        working-directory: ${{ github.workspace }}
        run: pnpm sbom:validate

      # Reject a moved tag or incompatible immutable Release before the npm
      # registry mutation. Draft creation remains after publish so a failed
      # registry upload cannot leave a public GitHub Release behind.
      - name: Preflight immutable npm GitHub release state
        id: npm_release_state
        if: github.event_name == 'release' || github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          remote_sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG}" --jq '.sha')
          if [ "$remote_sha" != "$GITHUB_SHA" ]; then
            echo "::error::npm release tag ${TAG} moved to ${remote_sha}; expected ${GITHUB_SHA}."
            exit 1
          fi

          assets=(docs/sbom/mcop-core.cdx.json docs/sbom/mcop-framework.cdx.json)
          for asset in "${assets[@]}"; do test -f "$asset"; done
          expected=$(
            for asset in "${assets[@]}"; do
              printf '%s sha256:%s\n' "$(basename "$asset")" "$(sha256sum "$asset" | awk '{print $1}')"
            done | LC_ALL=C sort
          )

          create_release=true
          if release_json=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,assets 2>/dev/null); then
            if [ "$(jq -r '.isDraft' <<<"$release_json")" = 'true' ]; then
              echo "Removing incomplete draft release for ${TAG}; published releases are never deleted."
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag=false
            else
              actual=$(jq -r '.assets[] | "\(.name) \(.digest // \"\")"' <<<"$release_json" | LC_ALL=C sort)
              if [ "$actual" != "$expected" ]; then
                echo "::error::Published npm release ${TAG} exists with a different asset set or digest."
                diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
                exit 1
              fi
              echo "Published npm release ${TAG} already has the exact verified SBOM assets; preserving it."
              create_release=false
            fi
          fi
          echo "create_release=$create_release" >> "$GITHUB_OUTPUT"

      # Trusted publishing is auto-detected by the npm CLI when `id-token: write`
      # is set. Provenance is generated automatically — no `--provenance` flag
      # needed and no NPM_TOKEN required.
      #
      # `actions/setup-node` (with `registry-url`) writes a `.npmrc` containing
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and exports the
      # literal sentinel `NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX` as default.
      # When the repo has no real `NODE_AUTH_TOKEN` secret (the correct config
      # for Trusted Publishing), npm CLI 11.x sees the bogus token, prefers it
      # over OIDC, and fails auth with a misleading `404 Not Found - PUT` from
      # the registry. Clearing `NODE_AUTH_TOKEN` to an empty string is a step
      # forward (the placeholder no longer poisons the request body), but it
      # is *not enough on its own*: npm 11.x then sees `_authToken=` (empty)
      # in `.npmrc` as "auth is configured but empty" and refuses to fall
      # through to OIDC, surfacing `ENEEDAUTH` instead.
      #
      # The defence-in-depth fix: clear `NODE_AUTH_TOKEN` AND strip every
      # `_authToken` line from the `.npmrc` written by setup-node. With both
      # in place, npm CLI sees no auth config at all and correctly detects
      # the OIDC env vars (`ACTIONS_ID_TOKEN_REQUEST_TOKEN` etc.) for trusted
      # publishing. Provenance attestation is still signed via Sigstore
      # automatically.
      #
      # Refs: actions/setup-node#1445, npm/cli#9088
      - name: Publish to npm (trusted publishing + automatic provenance)
        if: >-
          (github.event_name == 'release' || github.event_name == 'push') &&
          steps.npm_registry.outputs.version_published != 'true'
        run: |
          # IMPORTANT: We need npm to see *no* NODE_AUTH_TOKEN at all (not
          # empty, not undefined-but-still-injected) so it triggers its OIDC
          # trusted-publishing path. Empirically (#561, #563), neither
          # `env: NODE_AUTH_TOKEN: ''` at step level nor `unset NODE_AUTH_TOKEN`
          # in bash is enough — the runner re-injects the var (likely from
          # actions/setup-node's contribution to $GITHUB_ENV) before each
          # invocation, so by the time `npm publish` runs the variable is
          # back. We use `env -u` to bypass bash's variable handling entirely
          # and exec `npm` with a child environment that the kernel itself
          # has stripped of NODE_AUTH_TOKEN.
          #
          # We also strip every `_authToken` line from the `.npmrc` written
          # by setup-node, because npm 11.x treats `_authToken=` (empty) as
          # "auth is configured but missing" and surfaces ENEEDAUTH instead
          # of falling through to OIDC.
          #
          # Refs: actions/setup-node#1445, npm/cli#9088
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            echo "Stripping _authToken lines from $NPM_CONFIG_USERCONFIG so npm CLI falls through to OIDC trusted publishing…"
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
            echo "--- effective .npmrc after strip ---"
            cat "$NPM_CONFIG_USERCONFIG"
            echo "------------------------------------"
          fi
          echo "=== OIDC env presence (sanitised) ==="
          printenv | grep -E '^(ACTIONS_ID_TOKEN_REQUEST_(URL|TOKEN)|NODE_AUTH_TOKEN|NPM_CONFIG_USERCONFIG)=' | sed -E 's/=.*/=<set>/'
          echo "=== publishing with NODE_AUTH_TOKEN removed at exec time ==="
          # npm's OIDC trusted-publishing flow (lib/utils/oidc.js) POSTs the
          # GitHub OIDC token to:
          #   https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/<pkg>
          # If that token-exchange call fails (e.g. Trusted Publisher mismatch
          # on npm's side), npm 11.x logs the reason ONLY at verbose level
          # and silently falls through to token auth, surfacing ENEEDAUTH
          # without any indication of why OIDC failed.
          #
          # We run with --loglevel=verbose so the OIDC failure reason is in
          # the workflow output, and we deliberately do NOT fail-fast — we
          # always cat the npm debug log on failure so the verbose oidc
          # diagnostics survive even if the run exits non-zero.
          set +e
          env -u NODE_AUTH_TOKEN npm publish \
            --access public \
            --provenance \
            --loglevel=verbose
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::group::npm publish debug log (most recent)"
            latest_log=$(ls -t "$HOME/.npm/_logs/"*-debug-0.log 2>/dev/null | head -1 || true)
            if [ -n "$latest_log" ] && [ -f "$latest_log" ]; then
              cat "$latest_log"
            else
              echo "(no npm debug log found at $HOME/.npm/_logs/)"
            fi
            echo "::endgroup::"
            exit "$publish_exit"
          fi

      - name: Skip npm publish for already-published version
        if: >-
          (github.event_name == 'release' || github.event_name == 'push') &&
          steps.npm_registry.outputs.version_published == 'true'
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          echo "${pkg_name}@${pkg_version} is already present on npm; treating this duplicate release path as successful."

      # ------------------------------------------------------------------
      # Immutable-safe GitHub Release lifecycle. The tag-push run owns release
      # creation: SBOMs are uploaded and verified while the Release is still a
      # draft, then the exact draft is published. The resulting `release:
      # published` event is an idempotent retry that preserves an exact
      # published Release and rejects any mismatch.
      # ------------------------------------------------------------------
      - name: Create fresh npm draft release
        if: steps.npm_release_state.outputs.create_release == 'true'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#npm-v}"
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft --verify-tag --latest=false \
            --title "@kullailabs/mcop-core ${version}" \
            --notes "Public npm release for @kullailabs/mcop-core@${version}, published with npm Trusted Publishing (OIDC) and provenance. The attached CycloneDX SBOMs were generated and schema-validated from this tagged commit."

      - name: Upload and verify npm release SBOMs before publishing
        if: steps.npm_release_state.outputs.create_release == 'true'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(docs/sbom/mcop-core.cdx.json docs/sbom/mcop-framework.cdx.json)
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" "${assets[@]}"

          release_json=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,assets)
          test "$(jq -r '.isDraft' <<<"$release_json")" = 'true'
          expected=$(
            for asset in "${assets[@]}"; do
              printf '%s sha256:%s\n' "$(basename "$asset")" "$(sha256sum "$asset" | awk '{print $1}')"
            done | LC_ALL=C sort
          )
          actual=$(jq -r '.assets[] | "\(.name) \(.digest // \"\")"' <<<"$release_json" | LC_ALL=C sort)
          if [ "$actual" != "$expected" ]; then
            echo "::error::Draft npm release assets do not match the verified SBOMs; refusing to publish an immutable release."
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi

          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest=false

      - name: Verify final immutable npm release assets
        if: github.event_name == 'release' || github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          release_json=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,assets)
          test "$(jq -r '.isDraft' <<<"$release_json")" = 'false'
          expected=$(
            for asset in docs/sbom/mcop-core.cdx.json docs/sbom/mcop-framework.cdx.json; do
              printf '%s sha256:%s\n' "$(basename "$asset")" "$(sha256sum "$asset" | awk '{print $1}')"
            done | LC_ALL=C sort
          )
          actual=$(jq -r '.assets[] | "\(.name) \(.digest // \"\")"' <<<"$release_json" | LC_ALL=C sort)
          if [ "$actual" != "$expected" ]; then
            echo "::error::Final npm release assets do not match the verified SBOMs."
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
