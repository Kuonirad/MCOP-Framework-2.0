name: Publish npm package

# Builds and publishes @kullailabs/mcop-core to the public npm registry
# using npm **Trusted Publishing** (OIDC). No NPM_TOKEN is stored or used.
# Provenance attestations (Sigstore transparency log) are generated
# automatically by npm when publishing via a trusted publisher.
#
# Required one-time setup on npmjs.com:
#   1. Publish the first release manually from `packages/core` to create the
#      package on npm. npm trusted publishers are package-level, and npm
#      requires the package to already exist before the trusted publisher can
#      be configured. **See `packages/core/BOOTSTRAP.md` for the exact
#      command sequence and the @scope-ownership prerequisite.**
#   2. Then open:
#      https://www.npmjs.com/package/@kullailabs/mcop-core → Settings →
#      Trusted publishing → GitHub Actions, with:
#     Organization or user : Kuonirad
#     Repository           : MCOP-Framework-2.0
#     Workflow filename    : publish-npm.yml
#     Environment          : npm
#
# This workflow includes a pre-flight registry probe so a release event
# triggered before the bootstrap is complete fails with a clear,
# human-readable error instead of a generic exit-code-1.
#
# Triggers:
#   • GitHub Release tagged `npm-v*` (e.g. `npm-v0.1.0`) → real publish
#   • Manual dispatch with `dry_run: true` (default) → validation only
#
# Requirements enforced in-workflow:
#   • npm CLI ≥ 11.5.1  (trusted publishing prerequisite)
#   • Node.js ≥ 22.14   (trusted publishing prerequisite — we use Node 24
#     because it ships with npm 11 already, avoiding a self-upgrade step
#     that is fragile on top of Node 22's bundled npm 10.x).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run `npm publish --dry-run` only (no upload)'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @kullailabs/mcop-core
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'npm-v'))
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@kullailabs/mcop-core
    permissions:
      contents: read
      id-token: write   # OIDC — required for Trusted Publishing + provenance
    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js 24 (ships with npm 11, required for trusted publishing)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm version is >= 11.5.1 (trusted publishing prerequisite)
        run: |
          node --version
          npm --version
          node -e "
            const v = require('child_process').execSync('npm --version').toString().trim();
            const [maj, min, patch] = v.split('.').map(Number);
            if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && patch < 1)))) {
              console.error('::error title=npm too old for trusted publishing::npm ' + v + ' is below the required 11.5.1. Do NOT reintroduce npm install -g npm@latest (MODULE_NOT_FOUND: promise-retry regression). Pin node-version to a newer Node 24 LTS minor instead.');
              process.exit(1);
            }
            console.log('npm ' + v + ' satisfies >= 11.5.1');
          "

      - name: Install core package dependencies
        run: npm install --no-package-lock --ignore-scripts=false || npm install --no-package-lock --ignore-scripts=false

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#npm-v}"
          pkg_version=$(node -p "require('./package.json').version")
          echo "tag version : $tag"
          echo "pkg version : $pkg_version"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Release tag npm-v$tag does not match package.json version $pkg_version"
            exit 1
          fi

      # Pre-flight: trusted publishing requires the package (and the @scope
      # it lives under) to already exist on the registry — npm cannot
      # auto-create a scope from a tokenless OIDC publish.  We probe the
      # registry up-front so a misconfigured release fails with a clear,
      # actionable error instead of dying inside `npm publish` with a
      # generic non-zero exit.
      - name: Pre-flight — verify package + scope are bootstrapped on npm
        if: github.event_name == 'release'
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          echo "Probing npm registry for ${pkg_name}…"
          http_code=$(curl -fsS -o /dev/null -w "%{http_code}" \
            "https://registry.npmjs.org/${pkg_name}" || echo "000")
          echo "Registry returned HTTP ${http_code}"
          if [ "$http_code" = "404" ]; then
            cat <<EOF >&2
          ::error title=npm publish bootstrap incomplete::${pkg_name} is not yet on the npm registry.
          Trusted publishing is package-scoped and cannot create the package or its @scope on the first run.
          Required one-time setup (see packages/core/BOOTSTRAP.md):
            1. Ensure the @scope owner on npmjs.com matches your account, or create the org.
            2. From a local checkout of packages/core, run: npm publish --access public
            3. On npmjs.com, configure the trusted publisher (workflow file: publish-npm.yml).
            4. Re-cut the GitHub Release; this workflow will then succeed via OIDC.
          EOF
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::Unexpected HTTP ${http_code} from registry probe — aborting before publish."
            exit 1
          fi
          echo "Package found on npm — proceeding to trusted-publish flow."

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish (dry run)
        if: >-
          github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish --access public --dry-run

      # Trusted publishing is auto-detected by the npm CLI when `id-token: write`
      # is set. Provenance is generated automatically — no `--provenance` flag
      # needed and no NPM_TOKEN required.
      - name: Publish to npm (trusted publishing + automatic provenance)
        if: >-
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        run: npm publish --access public
