name: Cypress E2E Tests (HUD + Performance)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    name: Cypress against standalone production server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Cypress is a blocking gate as of PR #487 (2026-04-26). The
    # Next.js 15.5 hydration block (Error: Connection closed from
    # /_next/static/chunks/<hash>.js) reproduces in headless Chrome
    # on Devin VMs but does NOT reproduce on real GitHub-hosted
    # runners — confirmed by two consecutive green Cypress runs on
    # main (PR #484 final run + workflow_dispatch run 24945861502).
    # The jest + jsdom + SSR HTML inspection path remains the
    # canonical correctness gate; Cypress is the live-browser
    # complement that catches real-hydration regressions the
    # jsdom path can't see. See docs/adr/2026-04-25-testing-strategy.md.

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: We intentionally omit `version:` here. pnpm/action-setup@v6
      # rejects specifying both `version:` and a `packageManager` field
      # in package.json (ERR_PNPM_BAD_PM_VERSION). The action will
      # auto-detect pnpm@9.15.0 from package.json's `packageManager`.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm install` does not always trigger Cypress's postinstall binary
      # download under pnpm's default isolated linker, which causes the
      # cypress-io/github-action (run with `install: false`) to fail with
      # "The cypress npm package is installed, but the Cypress binary is
      # missing" — see e.g. cypress-io/github-action#522. Running
      # `cypress install` explicitly is idempotent (no-op if the binary is
      # already cached at $HOME/.cache/Cypress/<version>/) so it's safe to
      # always run here.
      - name: Ensure Cypress binary is installed
        run: pnpm exec cypress install

      - name: Build production standalone server
        run: pnpm build

      # Next.js standalone output omits public/ and static/ — they must
      # be copied in for the server to serve them.
      - name: Stage standalone runtime
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Start production server in background
        run: |
          PORT=3000 node .next/standalone/server.js &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              echo "Server is up!"
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run Cypress tests
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        with:
          install: false
          browser: chrome
          record: false
          config: baseUrl=http://localhost:3000

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
