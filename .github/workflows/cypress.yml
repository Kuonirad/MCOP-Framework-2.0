name: Cypress E2E Tests (HUD + Performance)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    name: Cypress against standalone production server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Cypress is a blocking gate as of PR #487 (2026-04-26). The
    # Next.js 16 hydration block (Error: Connection closed from
    # /_next/static/chunks/<hash>.js) reproduces in headless Chrome
    # on Devin VMs but does NOT reproduce on real GitHub-hosted
    # runners — confirmed by two consecutive green Cypress runs on
    # main (PR #484 final run + workflow_dispatch run 24945861502).
    # The jest + jsdom + SSR HTML inspection path remains the
    # canonical correctness gate; Cypress is the live-browser
    # complement that catches real-hydration regressions the
    # jsdom path can't see. See docs/adr/2026-04-25-testing-strategy.md.

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # NOTE: We intentionally omit `version:` here. pnpm/action-setup@v6
      # rejects specifying both `version:` and a `packageManager` field
      # in package.json (ERR_PNPM_BAD_PM_VERSION). The action will
      # auto-detect pnpm@9.15.0 from package.json's `packageManager`.
      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production standalone server
        run: pnpm build

      # Next.js standalone output omits public/ and static/ — they must
      # be copied in for the server to serve them.
      - name: Stage standalone runtime
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Start production server in background
        run: |
          PORT=3000 node .next/standalone/server.js &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              echo "Server is up!"
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run Cypress tests
        uses: cypress-io/github-action@c495c3ddffba403ba11be95fffb67e25203b3799 # v7.1.10
        with:
          install: false
          browser: chrome
          record: false
          config: baseUrl=http://localhost:3000

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
