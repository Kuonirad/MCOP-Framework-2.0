name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-pr-stale: 14
          days-before-pr-close: 7
          days-before-issue-stale: 30
          days-before-issue-close: 15
          stale-pr-label: stale
          stale-issue-label: stale
          exempt-pr-labels: pinned,security,tracking
          exempt-issue-labels: pinned,security,tracking
          stale-pr-message: >
            This pull request has been automatically marked as stale after 14
            days without activity. It will be closed in 7 days unless activity
            resumes or the `pinned` label is added.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when you have time to
            push this forward.
          stale-issue-message: >
            This issue has been automatically marked as stale after 30 days
            without activity. It will be closed in 15 days unless activity
            resumes or the `pinned` label is added.
          close-issue-message: >
            Closing due to inactivity. Reopen if this is still relevant.
          operations-per-run: 200
