name: Publish Container

on:
  release:
    types: [published]
  push:
    branches: [main]
    # `scripts/release.sh` ships a release by pushing a `v*` tag (it does NOT
    # create a GitHub Release), so the container publish has to fire on the tag
    # push itself — `release: published` alone never runs for that path. The
    # `v*` glob excludes the Python `py-v*` tags handled by `publish-pypi.yml`,
    # and the job-level `if` below keeps gating the actual build.
    tags:
      - 'v*'

permissions:
  contents: read

# A tagged release can arrive as a tag push (via `scripts/release.sh`) and, if
# the same tag is later published as a GitHub Release, as a `release` event too.
# Serialize per-ref so two runs never race to push the same image tags to GHCR.
concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: ${{ github.event_name == 'push' || startsWith(github.ref, 'refs/tags/v') }}
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Verify Docker tags were generated
        run: |
          if [ -z "${{ steps.meta.outputs.tags }}" ]; then
            echo "::error::Docker metadata produced no tags for ref '${{ github.ref }}'. Container publishes only run for main or v* release tags."
            exit 1
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
