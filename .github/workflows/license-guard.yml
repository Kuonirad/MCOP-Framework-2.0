name: License Guard

on:
  push:
    branches: [main]
    paths:
      - 'LICENSE'
      - 'LICENSE-MIT-LEGACY'
      - 'NOTICE.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'public/llms.txt'
      - 'package.json'
      - 'packages/core/LICENSE'
      - 'packages/core/package.json'
      - 'mcop_package/LICENSE'
      - 'scripts/license-audit.sh'
      - '.github/workflows/license-guard.yml'
  pull_request:
    paths:
      - 'LICENSE'
      - 'LICENSE-MIT-LEGACY'
      - 'NOTICE.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'public/llms.txt'
      - 'package.json'
      - 'packages/core/LICENSE'
      - 'packages/core/package.json'
      - 'mcop_package/LICENSE'
      - 'scripts/license-audit.sh'
      - '.github/workflows/license-guard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: license-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Verify license artefacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Need PR base + HEAD so the SPDX soft-warn step can diff
          # `${{ github.event.pull_request.base.ref }}...HEAD`.
          fetch-depth: 0

      - name: Run license audit
        id: audit
        env:
          LICENSE_AUDIT_BASE_REF: ${{ github.event.pull_request.base.sha || 'origin/main' }}
        run: |
          set -o pipefail
          bash scripts/license-audit.sh 2>&1 | tee audit.txt

      - name: Post audit transcript on the PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const transcript = fs.existsSync('audit.txt')
              ? fs.readFileSync('audit.txt', 'utf8')
              : '(no audit transcript captured — script failed before any output)';
            const status = '${{ steps.audit.outcome }}' === 'success' ? '✅ PASS' : '❌ FAIL';
            const body = [
              `### License Guard — ${status}`,
              '',
              `Commit: \`${context.sha}\``,
              '',
              '<details><summary>Audit transcript</summary>',
              '',
              '```',
              transcript.trim(),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
