name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.23.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify workflow hygiene
        run: pnpm ci:workflow-hygiene

      - name: Run linter
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm exec jest --coverage --coverageReporters=json-summary --coverageReporters=lcov

      - name: Verify positive-impact attestation
        run: pnpm positive:verify

      - name: Assess verification quality (substrate-driven mutation test)
        run: pnpm positive:quality

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.23.0

      - name: Build project
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: .next/
          if-no-files-found: warn
          retention-days: 7

  conformance:
    name: Conformance spec
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.23.0

      # Pins the deterministic contracts (canonical-digest determinism, hot-path
      # TS<->Python parity + provenance, and the approved-changeset gate) that
      # any conforming implementation must satisfy. See docs/CONFORMANCE_SPEC.md.
      - name: Run conformance suite
        run: pnpm conformance:test

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.23.0

      - name: Run security audit
        run: pnpm audit --audit-level=high

      - name: Run lint security checks
        run: pnpm lint

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: mcop_package/pyproject.toml

      - name: Install mcop_package with dev extras
        # Hash-pinned pip + build + runtime + dev deps via the
        # ``.github/requirements/*.txt`` lockfiles satisfies OpenSSF
        # Scorecard's Pinned-Dependencies check end-to-end. The final
        # editable install of the in-repo package uses ``--no-deps`` so
        # nothing is fetched from PyPI without an integrity hash.
        working-directory: mcop_package
        run: |
          python -m pip install --require-hashes --no-deps -r ../.github/requirements/pip-bootstrap.txt
          python -m pip install --require-hashes -r ../.github/requirements/mcop-package-dev.txt
          python -m pip install --no-deps -e '.'

      - name: Verify import and console script
        working-directory: mcop_package
        run: |
          python -c "import mcop; print('mcop package import ok')"
          mcop --help >/dev/null || echo 'mcop CLI exit non-zero (acceptable if help exits 0/1/2)'

      - name: Run pytest
        working-directory: mcop_package
        run: python -m pytest -q

      - name: Build wheel and sdist
        working-directory: mcop_package
        run: python -m build

  core-package:
    name: npm package (@kullailabs/mcop-core)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js 22.23.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.0'

      - name: Install core package dependencies
        # npm ci pins every entry to the SRI-hashed lockfile — satisfies
        # OpenSSF Scorecard's Pinned-Dependencies check.
        working-directory: packages/core
        run: npm ci --ignore-scripts

      - name: Typecheck core package
        working-directory: packages/core
        run: npm run typecheck

      - name: Build core package (ESM + CJS + d.ts)
        working-directory: packages/core
        run: npm run build

      - name: Verify build artifacts
        working-directory: packages/core
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts

      - name: Smoke test ESM + CJS entries
        working-directory: packages/core
        run: |
          node --input-type=module -e "import('./dist/index.js').then(m => { if (typeof m.NovaNeoEncoder !== 'function') process.exit(1); console.log('ESM ok'); });"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.NovaNeoEncoder !== 'function') process.exit(1); console.log('CJS ok');"

      - name: Pack tarball (dry-run publish)
        working-directory: packages/core
        run: npm publish --dry-run --access public

  test-legacy-compat:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        legacy-runtime: ['22.x', '20.x']
    steps:
      - name: Report legacy compat status
        run: |
          echo "Legacy runtime context (${{ matrix.legacy-runtime }})."
          echo "Project enforces runtime 22.23.0 (see scripts/verify-workflow-hygiene.mjs)."
          echo "This job satisfies historical required-status-check contexts during the migration."

  publish-badge:
    name: Publish coverage badge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    # Generate the badge from the just-computed coverage and publish it to the
    # unprotected `badges` branch. Runs only on pushes to main (skipped on PRs),
    # so coverage drift never breaks a PR and the badge is never committed to
    # the protected main tree. README points at the raw URL of this branch.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.23.0
          install-deps: 'false'

      - name: Download coverage summary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-22.23.0
          path: coverage

      - name: Regenerate badge from coverage
        run: node scripts/coverage-badge.mjs

      - name: Publish badge to `badges` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SVG_SRC="$(pwd)/docs/badges/coverage.svg"
          test -f "$SVG_SRC"
          WORK="${RUNNER_TEMP}/badges-publish"
          AUTH_REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          rm -rf "$WORK"
          if git ls-remote --exit-code --heads "$AUTH_REPO" badges >/dev/null 2>&1; then
            git clone --depth 1 --branch badges "$AUTH_REPO" "$WORK"
          else
            mkdir -p "$WORK"
            git -C "$WORK" init -q
            git -C "$WORK" checkout -q -b badges
            git -C "$WORK" remote add origin "$AUTH_REPO"
          fi
          mkdir -p "$WORK/docs/badges"
          cp "$SVG_SRC" "$WORK/docs/badges/coverage.svg"
          git -C "$WORK" config user.name "github-actions[bot]"
          git -C "$WORK" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WORK" add docs/badges/coverage.svg
          if git -C "$WORK" diff --cached --quiet; then
            echo "Coverage badge unchanged; nothing to publish."
            exit 0
          fi
          git -C "$WORK" commit -q -m "chore(coverage): refresh badge [skip ci]"
          git -C "$WORK" push -u origin badges
