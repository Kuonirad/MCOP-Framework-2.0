name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run linter
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 20.x

      - name: Build project
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build
          path: .next/
          if-no-files-found: warn
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup project environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 20.x

      - name: Run security audit
        run: pnpm audit --audit-level=moderate

      - name: Run lint security checks
        run: pnpm lint

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: mcop_package/pyproject.toml

      - name: Install mcop_package with dev extras
        working-directory: mcop_package
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e '.[dev]'

      - name: Verify import and console script
        working-directory: mcop_package
        run: |
          python -c "import mcop; print('mcop package import ok')"
          mcop --help >/dev/null || echo 'mcop CLI exit non-zero (acceptable if help exits 0/1/2)'

      - name: Run pytest
        working-directory: mcop_package
        run: python -m pytest -q

      - name: Build wheel and sdist
        working-directory: mcop_package
        run: python -m build

  core-package:
    name: npm package (@kullailabs/mcop-core)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install core package dependencies
        working-directory: packages/core
        run: npm install --no-package-lock

      - name: Typecheck core package
        working-directory: packages/core
        run: npm run typecheck

      - name: Build core package (ESM + CJS + d.ts)
        working-directory: packages/core
        run: npm run build

      - name: Verify build artifacts
        working-directory: packages/core
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts

      - name: Smoke test ESM + CJS entries
        working-directory: packages/core
        run: |
          node --input-type=module -e "import('./dist/index.js').then(m => { if (typeof m.NovaNeoEncoder !== 'function') process.exit(1); console.log('ESM ok'); });"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.NovaNeoEncoder !== 'function') process.exit(1); console.log('CJS ok');"

      - name: Pack tarball (dry-run publish)
        working-directory: packages/core
        run: npm publish --dry-run --access public
