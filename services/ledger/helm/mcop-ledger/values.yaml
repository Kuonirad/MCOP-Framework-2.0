image:
  repository: ghcr.io/kuonirad/mcop-ledger
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8767

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# When set, every POST request must include the matching
# x-mcop-ledger-api-key header. Leave empty for "open" multi-tenancy
# (tenants are still isolated by tenantId but anyone can call).
apiKey: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ledger.example.com
      paths:
        - path: /
          pathType: Prefix

nodeSelector: {}
tolerations: []
affinity: {}
