# Compose spec version key is obsolete for Docker Compose v2+ and triggers a
# warning. The file is still parsed with the current schema. See
# https://docs.docker.com/compose/compose-file/04-version-and-name/.

services:
  mcop-app:
    image: ghcr.io/${GITHUB_REPOSITORY:-kuonirad/mcop-framework-2.0}:${TAG:-latest}
    container_name: mcop-framework
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MCOP_USE_CUDA=${MCOP_USE_CUDA:-0}
      - MCOP_CUDA_ENDPOINT=http://mcop-cuda-server:8765
    restart: unless-stopped

  # Hosted Provenance Ledger (v3.0). Exposes /etch, /query, /verify,
  # /export with multi-tenant Merkle forests. Toggle on by including
  # `--profile ledger` on `docker compose up`.
  mcop-ledger:
    build:
      context: .
      dockerfile: services/ledger/Dockerfile
    container_name: mcop-ledger
    ports:
      - "8767:8767"
    environment:
      - MCOP_LEDGER_HOST=0.0.0.0
      - MCOP_LEDGER_PORT=8767
      - MCOP_LEDGER_API_KEY=${MCOP_LEDGER_API_KEY:-}
    restart: unless-stopped
    profiles:
      - ledger

  # Phase 3 of the CUDA productionization plan: HTTP microservice
  # providing the six op-sharded kernels for `CUDAProvider` to call.
  # Toggle on by setting MCOP_USE_CUDA=1 in the environment.
  mcop-cuda-server:
    build:
      context: .
      dockerfile: mcop_cuda_server/Dockerfile
    container_name: mcop-cuda-server
    ports:
      - "8765:8765"
    environment:
      - MCOP_CUDA_HOST=0.0.0.0
      - MCOP_CUDA_PORT=8765
      - MCOP_CUDA_DEVICE=${MCOP_CUDA_DEVICE:-cuda:0}
      - MCOP_CUDA_REQUIRE=${MCOP_CUDA_REQUIRE:-0}
    restart: unless-stopped
    profiles:
      - cuda

  # Optional common services (comment out if not needed)
  # postgres:
  #   image: postgres:16
