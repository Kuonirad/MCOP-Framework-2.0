<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080816"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <linearGradient id="cyanCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0044aa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="violetCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2dff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#330099" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="magentaCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#880033" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#886600" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00f0ff" opacity="0.8"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b2dff" opacity="0.8"/>
    </marker>
    <marker id="arrowMagenta" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff006e" opacity="0.8"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffd700" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="1100" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="50" text-anchor="middle" fill="#8899aa" font-family="system-ui,sans-serif" font-size="12" letter-spacing="5">CORE ARCHITECTURE — ENCODE → RESONATE → ETCH → PROVENANCE</text>
  <line x1="100" y1="62" x2="1000" y2="62" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

  <!-- NOVA-NEO card -->
  <rect x="60" y="100" width="240" height="180" rx="8" fill="url(#cyanCard)" stroke="#00f0ff" stroke-width="1.5" opacity="0.9" filter="url(#cardGlow)"/>
  <rect x="60" y="100" width="240" height="6" rx="3" fill="#00f0ff" opacity="0.6"/>
  <text x="180" y="132" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="11" letter-spacing="2">NOVA-NEO ENCODER</text>
  <text x="180" y="150" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600">NovaNeoEncoder</text>
  <line x1="80" y1="160" x2="280" y2="160" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  <text x="80" y="178" fill="#aabbcc" font-family="monospace" font-size="10">Role: Context → Tensor</text>
  <text x="80" y="196" fill="#aabbcc" font-family="monospace" font-size="10">Deterministic encoding</text>
  <text x="80" y="214" fill="#aabbcc" font-family="monospace" font-size="10">Entropy-normalized</text>
  <text x="80" y="232" fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.7">dims: 64  |  normalize: true</text>
  <circle cx="180" cy="265" r="14" fill="#00f0ff" opacity="0.2" stroke="#00f0ff" stroke-width="1"/>
  <text x="180" y="269" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="9" font-weight="bold">ENC</text>

  <!-- STIGMERGY V5 card -->
  <rect x="430" y="80" width="240" height="200" rx="8" fill="url(#violetCard)" stroke="#7b2dff" stroke-width="1.5" opacity="0.9" filter="url(#cardGlow)"/>
  <rect x="430" y="80" width="240" height="6" rx="3" fill="#7b2dff" opacity="0.6"/>
  <text x="550" y="112" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="11" letter-spacing="2">STIGMERGY V5</text>
  <text x="550" y="130" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600">StigmergyV5</text>
  <line x1="450" y1="140" x2="650" y2="140" stroke="#7b2dff" stroke-width="0.5" opacity="0.3"/>
  <text x="450" y="158" fill="#aabbcc" font-family="monospace" font-size="10">Role: Pheromone memory</text>
  <text x="450" y="176" fill="#aabbcc" font-family="monospace" font-size="10">Cosine recall vectors</text>
  <text x="450" y="194" fill="#aabbcc" font-family="monospace" font-size="10">Merkle-chained traces</text>
  <text x="450" y="212" fill="#aabbcc" font-family="monospace" font-size="10">Ant-colony inspired</text>
  <text x="450" y="232" fill="#7b2dff" font-family="monospace" font-size="10" opacity="0.8">threshold: 0.4 cosine</text>
  <circle cx="550" cy="265" r="14" fill="#7b2dff" opacity="0.2" stroke="#7b2dff" stroke-width="1"/>
  <text x="550" y="269" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold">MEM</text>

  <!-- HOLOGRAPHIC ETCH card -->
  <rect x="800" y="100" width="240" height="180" rx="8" fill="url(#magentaCard)" stroke="#ff006e" stroke-width="1.5" opacity="0.9" filter="url(#cardGlow)"/>
  <rect x="800" y="100" width="240" height="6" rx="3" fill="#ff006e" opacity="0.6"/>
  <text x="920" y="132" text-anchor="middle" fill="#ff6eb4" font-family="monospace" font-size="11" letter-spacing="2">HOLOGRAPHIC ETCH</text>
  <text x="920" y="150" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600">HolographicEtch</text>
  <line x1="820" y1="160" x2="1020" y2="160" stroke="#ff006e" stroke-width="0.5" opacity="0.3"/>
  <text x="820" y="178" fill="#aabbcc" font-family="monospace" font-size="10">Role: Confidence ledger</text>
  <text x="820" y="196" fill="#aabbcc" font-family="monospace" font-size="10">Append-only rank-1</text>
  <text x="820" y="214" fill="#aabbcc" font-family="monospace" font-size="10">Replayable etch chain</text>
  <text x="820" y="232" fill="#ff006e" font-family="monospace" font-size="10" opacity="0.7">floor: 0  |  immutable</text>
  <circle cx="920" cy="265" r="14" fill="#ff006e" opacity="0.2" stroke="#ff006e" stroke-width="1"/>
  <text x="920" y="269" text-anchor="middle" fill="#ff6eb4" font-family="monospace" font-size="9" font-weight="bold">ETH</text>

  <!-- Flow arrows ENC -> MEM -->
  <path d="M300,190 Q370,170 430,180" fill="none" stroke="#00f0ff" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.7" marker-end="url(#arrowCyan)"/>
  <text x="365" y="162" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="9" opacity="0.8">encode</text>

  <!-- Flow arrows MEM -> ETH -->
  <path d="M670,175 Q735,160 800,170" fill="none" stroke="#7b2dff" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.7" marker-end="url(#arrowViolet)"/>
  <text x="735" y="152" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="9" opacity="0.8">resonate</text>

  <!-- PROVENANCE card -->
  <rect x="330" y="370" width="440" height="160" rx="8" fill="url(#goldCard)" stroke="#ffd700" stroke-width="1.5" opacity="0.9" filter="url(#cardGlow)"/>
  <rect x="330" y="370" width="440" height="6" rx="3" fill="#ffd700" opacity="0.5"/>
  <text x="550" y="402" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="11" letter-spacing="3">PROVENANCE METADATA BUNDLE</text>
  <text x="550" y="422" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600">ProvenanceMetadata</text>
  <line x1="350" y1="432" x2="750" y2="432" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <text x="360" y="450" fill="#aabbcc" font-family="monospace" font-size="10">merkleRoot: string</text>
  <text x="360" y="466" fill="#aabbcc" font-family="monospace" font-size="10">timestamp: ISO8601</text>
  <text x="360" y="482" fill="#aabbcc" font-family="monospace" font-size="10">sessionId: uuid</text>
  <text x="560" y="450" fill="#aabbcc" font-family="monospace" font-size="10">encodeHash: sha256</text>
  <text x="560" y="466" fill="#aabbcc" font-family="monospace" font-size="10">resonanceScore: float</text>
  <text x="560" y="482" fill="#aabbcc" font-family="monospace" font-size="10">etchSequence: number</text>

  <!-- Arrows down to provenance -->
  <path d="M180,285 Q180,340 350,390" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5" marker-end="url(#arrowCyan)"/>
  <path d="M550,285 L550,368" fill="none" stroke="#7b2dff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5" marker-end="url(#arrowViolet)"/>
  <path d="M920,285 Q920,340 752,390" fill="none" stroke="#ff006e" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5" marker-end="url(#arrowMagenta)"/>
  <text x="550" y="352" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="9" opacity="0.8">→ provenance</text>

  <!-- Bottom label -->
  <text x="550" y="572" text-anchor="middle" fill="#334455" font-family="monospace" font-size="11">Every run produces a cryptographically-linked ProvenanceMetadata bundle</text>
  <line x1="100" y1="558" x2="1000" y2="558" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
</svg>
