<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="60%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2dff"/>
      <stop offset="100%" stop-color="#4a00cc"/>
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#aa0044"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7b2dff"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hexGrid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 58,16 58,36 30,50 2,36 2,16" fill="none" stroke="#00f0ff" stroke-width="0.4" opacity="0.15"/>
      <polygon points="30,28 58,42 58,62 30,76 2,62 2,42" fill="none" stroke="#7b2dff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>
  <rect width="1200" height="500" fill="url(#hexGrid)"/>

  <!-- Ambient glows -->
  <ellipse cx="600" cy="250" rx="500" ry="200" fill="#00f0ff" opacity="0.03"/>
  <ellipse cx="200" cy="300" rx="200" ry="150" fill="#7b2dff" opacity="0.06"/>
  <ellipse cx="1000" cy="200" rx="200" ry="150" fill="#ff006e" opacity="0.05"/>

  <!-- Corner brackets TL -->
  <polyline points="30,20 30,55 65,55" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets TR -->
  <polyline points="1170,20 1170,55 1135,55" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets BL -->
  <polyline points="30,480 30,445 65,445" fill="none" stroke="#7b2dff" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets BR -->
  <polyline points="1170,480 1170,445 1135,445" fill="none" stroke="#7b2dff" stroke-width="2" opacity="0.8"/>

  <!-- Scan lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#7b2dff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#7b2dff" stroke-width="0.3" opacity="0.1"/>

  <!-- Left: Triad visualization -->
  <!-- NOVA-NEO node -->
  <circle cx="820" cy="160" r="70" fill="#00f0ff" opacity="0.08"/>
  <circle cx="820" cy="160" r="55" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="820" cy="160" r="45" fill="url(#cyanGrad)" opacity="0.2"/>
  <circle cx="820" cy="160" r="30" fill="#00f0ff" opacity="0.3" filter="url(#glow2)"/>
  <text x="820" y="153" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold">NOVA</text>
  <text x="820" y="168" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="10">NEO</text>

  <!-- STIGMERGY node -->
  <circle cx="960" cy="310" r="65" fill="#7b2dff" opacity="0.08"/>
  <circle cx="960" cy="310" r="50" fill="none" stroke="#7b2dff" stroke-width="2" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="960" cy="310" r="40" fill="url(#violetGrad)" opacity="0.2"/>
  <circle cx="960" cy="310" r="26" fill="#7b2dff" opacity="0.4" filter="url(#glow2)"/>
  <text x="960" y="303" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">STIG</text>
  <text x="960" y="318" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="9">MERGY</text>

  <!-- HOLOGRAPHIC ETCH node -->
  <circle cx="700" cy="330" r="55" fill="#ff006e" opacity="0.08"/>
  <circle cx="700" cy="330" r="43" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.6" filter="url(#glow1)"/>
  <circle cx="700" cy="330" r="33" fill="url(#magentaGrad)" opacity="0.2"/>
  <circle cx="700" cy="330" r="22" fill="#ff006e" opacity="0.35" filter="url(#glow2)"/>
  <text x="700" y="323" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">HOLO</text>
  <text x="700" y="337" text-anchor="middle" fill="#ff6eb4" font-family="monospace" font-size="9">ETCH</text>

  <!-- Provenance center -->
  <circle cx="827" cy="267" r="20" fill="#ffd700" opacity="0.15"/>
  <circle cx="827" cy="267" r="12" fill="#ffd700" opacity="0.4" filter="url(#glow1)"/>
  <text x="827" y="271" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="7" font-weight="bold">PRV</text>

  <!-- Connection lines -->
  <line x1="820" y1="215" x2="827" y2="255" stroke="#00f0ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="960" y1="263" x2="840" y2="265" stroke="#7b2dff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="290" x2="820" y2="272" stroke="#ff006e" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Data flow arrows -->
  <polygon points="824,255 830,255 827,248" fill="#00f0ff" opacity="0.8"/>
  <polygon points="840,262 840,268 847,265" fill="#7b2dff" opacity="0.8"/>
  <polygon points="820,270 817,276 824,273" fill="#ff006e" opacity="0.8"/>

  <!-- Main title -->
  <text x="100" y="155" fill="#8899aa" font-family="system-ui,sans-serif" font-size="13" letter-spacing="6" opacity="0.9">META-COGNITIVE OPTIMIZATION PROTOCOL</text>

  <!-- MCOP text -->
  <text x="95" y="250" fill="url(#titleGrad)" font-family="system-ui,sans-serif" font-size="88" font-weight="900" letter-spacing="-2" filter="url(#softGlow)">MCOP</text>

  <!-- Framework 2.0 -->
  <text x="100" y="308" fill="#ffffff" font-family="system-ui,sans-serif" font-size="42" font-weight="300" letter-spacing="2" opacity="0.9">Framework</text>
  <text x="380" y="308" fill="#00f0ff" font-family="system-ui,sans-serif" font-size="42" font-weight="700" filter="url(#glow1)"> 2.0</text>

  <!-- Tagline -->
  <text x="100" y="350" fill="#8899cc" font-family="system-ui,sans-serif" font-size="16">Deterministic  ·  Auditable  ·  Triad Orchestration</text>

  <!-- Divider line -->
  <line x1="100" y1="370" x2="560" y2="370" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Sub-line -->
  <text x="100" y="392" fill="#556677" font-family="monospace" font-size="12">Universal Adapter Protocol v2.1  ·  KullAILABS  ·  BUSL 1.1 → MIT 2030</text>

  <!-- Bottom URL -->
  <text x="100" y="460" fill="#334455" font-family="monospace" font-size="11">github.com/Kuonirad/MCOP-Framework-2.0</text>

  <!-- Bottom right version tag -->
  <rect x="1050" y="440" width="110" height="28" rx="4" fill="#00f0ff" opacity="0.1" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <text x="1105" y="458" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="12" font-weight="bold">v 2.2.1</text>
</svg>
