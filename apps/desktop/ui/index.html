<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02040b" />
    <title>MCOP · Initializing substrate</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #e6f7ff;
        background:
          radial-gradient(circle at 50% 42%, rgba(34, 211, 238, .13), transparent 24rem),
          radial-gradient(circle at 20% 80%, rgba(139, 92, 246, .1), transparent 28rem),
          #02040b;
      }
      .grid {
        position: fixed;
        inset: 0;
        opacity: .16;
        background-image:
          linear-gradient(rgba(125, 211, 252, .16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(125, 211, 252, .16) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(circle, black, transparent 74%);
      }
      main { position: relative; display: grid; justify-items: center; gap: 1.25rem; }
      .orb {
        width: 104px;
        aspect-ratio: 1;
        border-radius: 999px;
        border: 1px solid rgba(125, 211, 252, .55);
        background: radial-gradient(circle at 36% 30%, #dff9ff, #22d3ee 12%, #312e81 52%, #020617 74%);
        box-shadow: 0 0 48px rgba(34, 211, 238, .36), inset 0 0 32px rgba(255,255,255,.18);
        animation: breathe 1.8s ease-in-out infinite alternate;
      }
      .eyebrow { margin: 0; color: #67e8f9; font-size: .68rem; letter-spacing: .42em; text-transform: uppercase; }
      h1 { margin: 0; font-size: 1.45rem; font-weight: 540; letter-spacing: .08em; }
      .status { margin: 0; color: rgba(203, 213, 225, .7); font-size: .78rem; letter-spacing: .09em; }
      @keyframes breathe { to { transform: scale(1.055); filter: hue-rotate(18deg); } }
      @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }
    </style>
  </head>
  <body>
    <div class="grid" aria-hidden="true"></div>
    <main>
      <div class="orb" aria-hidden="true"></div>
      <p class="eyebrow">Stigmergic trust substrate</p>
      <h1>MCOP DESKTOP</h1>
      <p class="status">Verifying local runtime · opening the field</p>
    </main>
  </body>
</html>
